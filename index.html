            darkMode: 'class',

                extend: {

        body.theme-lavender { --theme-50: #f5f3ff; --theme-100: #ede9fe; --theme-200: #ddd6fe; --theme-300: #c4b5fd; --theme-400: #a78bfa; --theme-500: #8b5cf6; --theme-600: #7c3aed; --theme-700: #6d28d9; --theme-800: #5b21b6; --theme-900: #4c1d95; }

        body { background-color: #f8fafc; color: #1e293b; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; }
        .dark body { background-color: #0f172a; color: #f8fafc; }
        
        .day-cell:active { transform: scale(0.95); transition: 0.1s; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .toggle-checkbox:checked { right: 0; border-color: var(--theme-500); }
        .toggle-checkbox:checked + .toggle-label { background-color: var(--theme-500); }
        .key-btn:active { background-color: #e2e8f0; transform: scale(0.95); }
        .dark .key-btn:active { background-color: #334155; }
        .privacy-blur { filter: blur(8px) grayscale(50%); pointer-events: none; user-select: none; transition: all 0.3s; }
        .bar-grow { animation: growUp 0.8s ease-out forwards; transform-origin: bottom; }
        @keyframes growUp { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    </style>
</head>

        let tutorialStep = 0; 
        const DB_KEY = 'lunea_master_db'; 
        const LEGACY_KEYS = ['lunea_v59_pin', 'lunea_v58_pill', 'lunea_v57_final']; 

        let state = {
            view: 'calendar',
            currentMonth: new Date(),
            viewYear: new Date().getFullYear(),
            selectedDate: null,
            users: [{ id: '1', name: 'Yo', config: { theme: 'rose', lastPeriod: new Date().toISOString().split('T')[0], cycleLen: 28, periodLen: 5, pill: false, pregnancyMode: false }, periodHistory: [], logs: {}, pregnancyData: { kicks:0, kickStart:null, kickLogs:[], contractions:[], contractionStart:null } }],

            showTutorial: true,
            pin: null, 
            inputPin: '',
            isBlurred: false,
            darkMode: false,
            reportMonths: 1 
        };

        try {
            let saved = localStorage.getItem(DB_KEY);
            if (!saved) { for (const key of LEGACY_KEYS) { const legacyData = localStorage.getItem(key); if (legacyData) { saved = legacyData; localStorage.setItem(DB_KEY, saved); break; } } }
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed, currentMonth: new Date(), viewYear: new Date().getFullYear(), selectedDate: null, inputPin: '' };
                if (!state.reportMonths) state.reportMonths = 1;
                state.users.forEach(u => {
                    if (!u.periodHistory) u.periodHistory = [u.config.lastPeriod];

                if (state.pin) state.view = 'locked';

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(state)); render(); }
        function getUser() { return state.users.find(u => u.id === state.currentUserId) || state.users[0]; }
        function toKey(d) { const o = d.getTimezoneOffset() * 60000; return new Date(d.getTime() - o).toISOString().split('T')[0]; }

        function recalculateCycleStats(user) {
            if (!user.periodHistory || user.periodHistory.length < 2) return;
            const sortedHistory = [...user.periodHistory].sort((a, b) => new Date(a) - new Date(b));
            user.config.lastPeriod = sortedHistory[sortedHistory.length - 1];

            let totalDays = 0, count = 0;
            for (let i = 1; i < sortedHistory.length; i++) {
                const diffDays = Math.ceil(Math.abs(new Date(sortedHistory[i]) - new Date(sortedHistory[i-1])) / 86400000);
                if (diffDays >= 15 && diffDays <= 50) { totalDays += diffDays; count++; }
            }
            if (count > 0) user.config.cycleLen = Math.round(totalDays / count);
        }

        function togglePeriodStart(dateStr) {
            const user = getUser();
            if (!user.periodHistory) user.periodHistory = [];
            if (user.periodHistory.includes(dateStr)) { user.periodHistory = user.periodHistory.filter(d => d !== dateStr); } 
            else { user.periodHistory.push(dateStr); if(user.config.pregnancyMode) user.config.pregnancyMode = false; }
            recalculateCycleStats(user); save();
        }

        function getCycleDay(dateStr) {
            const user = getUser();
            const start = new Date(user.config.lastPeriod + 'T00:00:00');
            const target = new Date(dateStr + 'T00:00:00');
            if (target < start && user.periodHistory?.length > 0) {
                const sorted = [...user.periodHistory].sort((a, b) => new Date(b) - new Date(a));
                const relevantStart = sorted.find(d => new Date(d + 'T00:00:00') <= target);
                if (relevantStart) return Math.floor((target - new Date(relevantStart + 'T00:00:00')) / 86400000) + 1;
            }
            const diff = Math.floor((target - start) / 86400000);
            return diff < 0 ? null : diff + 1;
        }

        function getPhase(dateStr) {
            const user = getUser();
            if (user.config.pregnancyMode) return {l:'Embarazo', bg:'bg-fuchsia-400', t:'text-fuchsia-600 dark:text-fuchsia-400', light:'bg-fuchsia-50 dark:bg-fuchsia-900/30 border-fuchsia-100 dark:border-fuchsia-800', isStart:false};
            let cd = getCycleDay(dateStr);
            if (!cd) return null;
            if (cd > user.config.cycleLen) cd = ((cd - 1) % user.config.cycleLen) + 1;
            const ov = user.config.cycleLen - 14;
            const isStart = user.periodHistory?.includes(dateStr);
            
            if (cd <= user.config.periodLen) return { ...PHASE_INFO['Menstruación'], isStart, l: 'Menstruación', risk: 'safe' };
            if (cd >= ov - 5 && cd < ov) return { ...PHASE_INFO['Fértil'], isStart, l: 'Fértil', risk: 'fertile' };
            if (cd === ov) return { ...PHASE_INFO['Ovulación'], isStart, l: 'Ovulación', risk: 'fertile' };
            if (cd > ov + 2) return { ...PHASE_INFO['Lútea'], isStart, l: 'Lútea', risk: 'safe' };
            if (cd > ov && cd <= ov + 2) return { ...PHASE_INFO['Lútea'], isStart, l: 'Lútea', risk: 'fertile' }; 
            return { ...PHASE_INFO['Folicular'], isStart, l: 'Folicular', risk: (cd >= ov - 7 ? 'fertile' : 'safe') };
        }

        // --- ACCIONES ---
        window.setView = (v) => { state.view = v; render(); };

        window.exportData = () => { const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(state)); const a = document.createElement('a'); a.setAttribute('href', dataUri); a.setAttribute('download', `lunea_backup_${new Date().toISOString().split('T')[0]}.json`); a.click(); };
        window.triggerImport = () => document.getElementById('importFile').click();
        window.importData = (input) => { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { try { const loadedState = JSON.parse(e.target.result); if (!loadedState.users) throw new Error(); if(confirm("¿Restaurar copia? Se reemplazarán los datos actuales.")) { state = { ...state, ...loadedState, view: 'calendar', selectedDate: null, inputPin: '', currentMonth: new Date() }; save(); location.reload(); } } catch(err) { alert("Error al importar el archivo."); } }; reader.readAsText(file); input.value = ''; };

esarrollado por Juan Miguel Rios Redondo</div></div><div class="mt-8 flex gap-4 no-print"><button id="btn-descargar-pdf" onclick="downloadPDF()" class="bg-theme-500 text-white px-8 py-3 rounded-xl font-bold">Descargar PDF</button><button onclick="setView('settings')" class="px-8 py-3 border rounded-xl bg-white">Volver</button></div></div>`;

                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder"><h3 class="font-bold mb-2 text-slate-800 dark:text-darkText text-lg flex gap-2 items-center"><span class="text-fuchsia-500">${ICONS.baby}</span> Planificación Familiar</h3><p class="text-xs text-slate-400 mb-4 leading-snug">Posibles fechas de parto si concibes en tus próximos ciclos.</p><div class="bg-slate-50 dark:bg-darkBg rounded-xl border border-slate-100 dark:border-darkBorder">${planningHtml}</div></div>
                        
                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder">
                            <h3 class="font-bold mb-4 text-slate-800 dark:text-darkText text-lg">Tema de la App</h3>
                            <div class="flex justify-between gap-2">
                                <button onclick="updateConfig('theme', 'rose')" class="w-12 h-12 rounded-full bg-rose-500 shadow-md ${user.config.theme === 'rose' ? 'ring-4 ring-rose-200 dark:ring-rose-800' : 'opacity-50'} transition"></button>
                                <button onclick="updateConfig('theme', 'lavender')" class="w-12 h-12 rounded-full bg-violet-500 shadow-md ${user.config.theme === 'lavender' ? 'ring-4 ring-violet-200 dark:ring-violet-800' : 'opacity-50'} transition"></button>
                                <button onclick="updateConfig('theme', 'emerald')" class="w-12 h-12 rounded-full bg-emerald-500 shadow-md ${user.config.theme === 'emerald' ? 'ring-4 ring-emerald-200 dark:ring-emerald-800' : 'opacity-50'} transition"></button>
                                <button onclick="updateConfig('theme', 'orange')" class="w-12 h-12 rounded-full bg-orange-500 shadow-md ${user.config.theme === 'orange' ? 'ring-4 ring-orange-200 dark:ring-orange-800' : 'opacity-50'} transition"></button>
                            </div>
                        </div>

                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder"><h3 class="font-bold mb-4 text-slate-800 dark:text-darkText text-lg flex gap-2 items-center"><span class="text-rose-500">${ICONS.fileText}</span> Reporte Médico</h3><button onclick="setView('pdf')" class="w-full py-3 bg-theme-50 text-theme-600 font-bold rounded-xl border border-theme-200 transition shadow-sm">Configurar y Descargar PDF</button></div>
                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder"><h3 class="font-bold mb-4 text-slate-800 dark:text-darkText text-lg">Configuración del Ciclo</h3><div class="space-y-4 text-sm"><label class="block"><span class="text-slate-500 text-xs font-bold uppercase">Último Periodo</span><input type="date" value="${user.config.lastPeriod}" onchange="updateConfig('lastPeriod', this.value)" class="border border-slate-200 dark:border-darkBorder p-3 rounded-xl w-full mt-1 bg-slate-50 dark:bg-darkBg dark:text-white focus:outline-none"/></label><div class="flex gap-4"><label class="flex-1"><span class="text-slate-500 text-xs font-bold uppercase">Ciclo (Días)</span><input type="number" value="${user.config.cycleLen}" onchange="updateConfig('cycleLen', this.value)" class="border border-slate-200 dark:border-darkBorder p-3 rounded-xl w-full mt-1 bg-slate-50 dark:bg-darkBg dark:text-white focus:outline-none"/></label><label class="flex-1"><span class="text-slate-500 text-xs font-bold uppercase">Sangrado</span><input type="number" value="${user.config.periodLen}" onchange="updateConfig('periodLen', this.value)" class="border border-slate-200 dark:border-darkBorder p-3 rounded-xl w-full mt-1 bg-slate-50 dark:bg-darkBg dark:text-white focus:outline-none"/></label></div><div class="pt-2 border-t border-slate-100 dark:border-darkBorder mt-4 space-y-3"><label class="flex items-center gap-3 p-3 border border-slate-200 dark:border-darkBorder rounded-xl cursor-pointer hover:bg-theme-50 transition ${user.config.pregnancyMode ? 'opacity-50 pointer-events-none' : ''}"><input type="checkbox" ${user.config.pill ? 'checked' : ''} onchange="updateConfig('pill', this.checked ? 'true' : 'false')" class="w-5 h-5 accent-theme-500"><div class="flex flex-col"><span class="font-bold text-slate-700 dark:text-darkText">Pastilla Anticonceptiva</span></div></label><label class="flex items-center gap-3 p-3 border border-slate-200 dark:border-darkBorder rounded-xl cursor-pointer hover:bg-fuchsia-50 transition"><input type="checkbox" ${user.config.pregnancyMode ? 'checked' : ''} onchange="updateConfig('pregnancyMode', this.checked ? 'true' : 'false')" class="w-5 h-5 accent-fuchsia-500"><div class="flex flex-col"><span class="font-bold ${user.config.pregnancyMode ? 'text-fuchsia-600' : 'text-slate-700 dark:text-darkText'}">Modo Embarazo</span></div></label></div></div></div>
                        
                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder">
                            <h3 class="font-bold mb-4 text-slate-800 dark:text-darkText text-lg flex gap-2 items-center text-purple-500">${ICONS.info} Guía del Ciclo</h3>
                            <div class="bg-slate-50 dark:bg-darkBg p-4 rounded-xl border border-slate-100 dark:border-darkBorder">${guideHtml}</div>
                            <div class="mt-4 p-4 bg-slate-50 dark:bg-darkBg rounded-xl border border-slate-100 dark:border-darkBorder space-y-3">
                                <div class="flex gap-3 items-center text-fuchsia-400">${ICONS.sparkles}<span class="text-xs font-bold text-slate-700 dark:text-darkText">Estrellas: Alta Fertilidad (Posible embarazo)</span></div>
                                <div class="flex gap-3 items-center text-emerald-400">${ICONS.shieldCheck}<span class="text-xs font-bold text-slate-700 dark:text-darkText">Escudo: Días Seguros (Bajo riesgo)</span></div>
                            </div>
                        </div>

                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder"><div class="flex justify-between mb-4 items-center"><h3 class="font-bold text-lg text-slate-800 dark:text-darkText">Usuarios</h3><button onclick="addUser()" class="text-white bg-theme-500 p-1 rounded-lg">${ICONS.plus}</button></div><div class="flex flex-col">${usersHtml}</div></div>
                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder"><h3 class="font-bold mb-4 flex gap-2 items-center text-rose-500 text-lg">Historial</h3><div class="max-h-64 overflow-y-auto pr-2 custom-scroll">${historyHtml}</div></div>
                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder"><h3 class="font-bold mb-4 text-slate-800 dark:text-darkText text-lg flex gap-2 items-center text-blue-500">${ICONS.lock} Seguridad PIN</h3>${state.pin ? `<div class="flex justify-between items-center bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-100"><div class="flex gap-3 items-center"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div><span class="text-sm font-bold text-blue-900 dark:text-blue-300">App Protegida</span></div><button onclick="removePin()" class="text-red-500 text-sm font-bold underline">Eliminar</button></div>` : `<button onclick="startPinSetup()" class="w-full py-3 border-2 border-dashed border-slate-200 dark:border-darkBorder rounded-xl text-slate-500 font-bold flex items-center justify-center gap-2">${ICONS.plus} Crear PIN de Acceso</button>`}</div>
                        <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm mb-6 border border-slate-50 dark:border-darkBorder"><h3 class="font-bold mb-4 text-slate-800 dark:text-darkText text-lg flex gap-2 items-center text-emerald-500">${ICONS.download} Respaldo</h3><div class="grid grid-cols-2 gap-4"><button onclick="exportData()" class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-50 dark:bg-darkBg border border-slate-200 dark:border-darkBorder gap-2"><div class="text-emerald-500">${ICONS.download}</div><span class="text-xs font-bold text-slate-700 dark:text-darkText">Exportar</span></button><button onclick="triggerImport()" class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-50 dark:bg-darkBg border border-slate-200 dark:border-darkBorder gap-2"><div class="text-blue-500">${ICONS.upload}</div><span class="text-xs font-bold text-slate-700 dark:text-darkText">Importar</span></button></div></div>
                        <div class="text-center opacity-60 mb-12"><button onclick="openTutorial()" class="underline text-sm text-slate-600 dark:text-darkTextMuted mb-3 block w-full">Ver Tutorial de Nuevo</button><p class="text-[10px] font-bold text-slate-400 dark:text-slate-500 tracking-wider">DESARROLLADO POR JUAN MIGUEL RIOS REDONDO</p></div>
                    </div>`;
            }
            
            html += `</div>`; 

            if (state.view !== 'locked' && state.view !== 'setup_pin' && state.view !== 'pdf' && state.view !== 'pregnancy_tools') {
                const activeClass = "text-theme-500 dark:text-theme-400 scale-110 transition-transform";
                const inactiveClass = "text-slate-300 dark:text-slate-500";
                html += `<div class="fixed bottom-0 w-full bg-white/90 dark:bg-darkCard/90 backdrop-blur-md border-t border-slate-100 dark:border-darkBorder flex justify-around p-2 pb-6 z-40 transition-colors"><button onclick="setView('calendar')" class="flex flex-col items-center p-2 ${state.view === 'calendar' ? activeClass : inactiveClass}">${ICONS.calendar} <span class="text-[10px] font-bold mt-1">Hoy</span></button><button onclick="setView('year')" class="flex flex-col items-center p-2 ${state.view === 'year' ? activeClass : inactiveClass}">${ICONS.grid} <span class="text-[10px] font-bold mt-1">Año</span></button><button onclick="setView('settings')" class="flex flex-col items-center p-2 ${state.view === 'settings' ? activeClass : inactiveClass}">${ICONS.settings} <span class="text-[10px] font-bold mt-1">Ajustes</span></button></div>`;
            }

            if (state.selectedDate) {
                const k = state.selectedDate;
                const user = getUser();
                const log = user.logs[k] || {};
                const displayDate = new Date(k + 'T00:00:00').toLocaleDateString('es-ES', {weekday:'long', day:'numeric'});
                const isStart = user.periodHistory && user.periodHistory.includes(k);
                const currentPhase = getPhase(k);
                const phaseDetails = currentPhase ? (PHASE_INFO[currentPhase.l] || { desc: 'Etapa gestacional.', color: 'bg-fuchsia-500', text: 'text-fuchsia-600 dark:text-fuchsia-400', light: 'bg-fuchsia-50 dark:bg-fuchsia-900/30 border-fuchsia-100 dark:border-fuchsia-800' }) : null;

                const symList = user.config.pregnancyMode ? ['náuseas','antojos','pataditas','acidez','fatiga','sensibilidad'] : ['feliz','triste','irritable','cólicos','hinchazón','cansancio'];
                const symptomsHtml = symList.map(s => {
                    const isActive = (log.symptoms || []).includes(s);
                    const activeColor = user.config.pregnancyMode ? 'bg-fuchsia-100 dark:bg-fuchsia-900/40 border-fuchsia-300 text-fuchsia-700 scale-105' : 'bg-theme-100 dark:bg-theme-900/40 border-theme-300 text-theme-700 dark:text-theme-300 scale-105';
                    return `<button onclick="updateLog('${k}', 'symptoms', '${s}')" class="p-3 rounded-xl border flex flex-col items-center gap-1 transition shadow-sm ${isActive ? activeColor : 'border-slate-100 dark:border-darkBorder text-slate-500 dark:text-darkTextMuted bg-white dark:bg-darkCard'}"><span class="capitalize text-xs font-bold">${s}</span></button>`;
                }).join('');

                let pillSection = '';
                if (user.config.pill && !user.config.pregnancyMode) {
                    const taken = log.pill;
                    pillSection = `<div class="bg-theme-50 dark:bg-theme-900/20 p-4 rounded-xl mb-4 flex justify-between items-center border border-theme-100 dark:border-theme-800"><div class="flex items-center gap-3"><div class="bg-white dark:bg-darkCard p-2 rounded-full text-theme-500 shadow-sm">${ICONS.pill}</div><div><h4 class="font-bold text-slate-800 dark:text-darkText">Anticonceptivo</h4><p class="text-xs text-theme-600 dark:text-theme-400">${taken ? 'Tomada hoy' : 'Pendiente'}</p></div></div><button onclick="updateLog('${k}', 'pill')" class="px-4 py-2 rounded-lg font-bold text-sm transition ${taken ? 'bg-theme-500 text-white shadow-lg' : 'bg-white dark:bg-darkCard text-theme-500 border border-theme-200'}">${taken ? 'Tomada' : 'Marcar'}</button></div>`;
                }

                let fertilityHtml = '';
                if (!user.config.pregnancyMode) {
                    fertilityHtml = `<div class="grid grid-cols-2 gap-4 mb-4"><div class="bg-orange-50 dark:bg-orange-900/20 p-3 rounded-2xl border border-orange-100 dark:border-orange-900"><label class="text-[10px] font-bold text-orange-500 dark:text-orange-400 uppercase tracking-wider flex items-center gap-1 mb-2">${ICONS.thermometer} Temp Basal</label><div class="flex items-center gap-1 bg-white dark:bg-darkBg p-2 rounded-xl border border-orange-100 dark:border-orange-800"><input type="number" step="0.1" value="${log.bbt || ''}" onchange="updateLog('${k}', 'bbt', this.value)" placeholder="36.5" class="w-full text-center bg-transparent font-black text-slate-700 dark:text-darkText focus:outline-none"><span class="text-slate-400 text-xs font-bold">°C</span></div></div><div class="bg-purple-50 dark:bg-purple-900/20 p-3 rounded-2xl border border-purple-100 dark:border-purple-900"><label class="text-[10px] font-bold text-purple-500 dark:text-purple-400 uppercase tracking-wider flex items-center gap-1 mb-2">💧 Flujo</label><select onchange="updateLog('${k}', 'flow', this.value)" class="w-full bg-white dark:bg-darkBg p-2 rounded-xl text-xs font-bold text-slate-700 dark:text-darkText border border-purple-100 dark:border-purple-800 focus:outline-none"><option value="">Ninguno</option><option value="Seco" ${log.flow === 'Seco' ? 'selected' : ''}>Seco</option><option value="Pegajoso" ${log.flow === 'Pegajoso' ? 'selected' : ''}>Pegajoso</option><option value="Cremoso" ${log.flow === 'Cremoso' ? 'selected' : ''}>Cremoso</option><option value="Clara_huevo" ${log.flow === 'Clara_huevo' ? 'selected' : ''}>Fértil (Clara)</option></select></div></div>`;
                }

                const testResult = log.pregnancyTest;
                const pregnancyTestSection = `<div class="bg-fuchsia-50 dark:bg-fuchsia-900/20 p-4 rounded-2xl mb-4 border border-fuchsia-100 dark:border-fuchsia-900/50"><div class="flex items-center gap-2 mb-3"><div class="text-fuchsia-500">${ICONS.baby}</div><h4 class="text-sm font-bold text-fuchsia-700 dark:text-fuchsia-400 uppercase tracking-wider">Prueba de Embarazo</h4></div><div class="flex gap-2"><button onclick="updateLog('${k}', 'pregnancyTest', 'negative')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition flex justify-center items-center gap-2 ${testResult === 'negative' ? 'bg-slate-800 text-white shadow-md' : 'bg-white dark:bg-darkCard text-slate-500 border border-slate-200'}">Negativa</button><button onclick="updateLog('${k}', 'pregnancyTest', 'positive')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition flex justify-center items-center gap-2 ${testResult === 'positive' ? 'bg-fuchsia-500 text-white shadow-lg scale-105' : 'bg-white dark:bg-darkCard text-fuchsia-500 border border-fuchsia-200'}">Positiva</button></div></div>`;

                html += `<div class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end justify-center animate-in" onclick="closeModal()"><div class="w-full max-w-sm bg-white dark:bg-darkBg rounded-t-[2rem] p-6 h-[85vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()"><div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-bold capitalize text-slate-800 dark:text-darkText">${displayDate}</h3><button onclick="closeModal()" class="p-2 bg-slate-100 dark:bg-darkCard rounded-full text-slate-500 transition">${ICONS.close}</button></div>${currentPhase && !user.config.pregnancyMode ? `<div class="${phaseDetails.light} p-4 rounded-xl mb-4 border border-opacity-50"><div class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full ${phaseDetails.color}"></div><h4 class="font-bold ${phaseDetails.text}">${currentPhase.l}</h4></div><p class="text-xs text-slate-600 dark:text-slate-400 leading-snug">${phaseDetails.desc}</p></div>` : ''}${!user.config.pregnancyMode ? `<div class="bg-rose-50 dark:bg-rose-900/20 p-5 rounded-2xl mb-4 border border-rose-100 dark:border-rose-900 relative overflow-hidden transition-all">${isStart ? '<div class="absolute -right-4 -top-4 w-16 h-16 bg-rose-200 dark:bg-rose-800 rounded-full opacity-50"></div>' : ''}<div class="flex justify-between items-center relative z-10"><div class="flex items-center gap-4"><div class="bg-white dark:bg-darkCard p-3 rounded-full text-rose-500 shadow-sm">${ICONS.droplet}</div><div><h4 class="font-bold text-slate-800 dark:text-darkText">Menstruación</h4><p class="text-xs text-slate-500 dark:text-darkTextMuted">¿Inició hoy?</p></div></div><div class="relative inline-block w-14 h-8 align-middle select-none"><input type="checkbox" id="periodToggle" class="toggle-checkbox absolute block w-8 h-8 rounded-full bg-white dark:bg-darkCard border-4 appearance-none cursor-pointer border-slate-300 transition-all duration-300" ${isStart ? 'checked' : ''} onclick="handlePeriodToggle('${k}')"/><label for="periodToggle" class="toggle-label block overflow-hidden h-8 rounded-full bg-slate-300 dark:bg-slate-600 cursor-pointer transition-all duration-300"></label></div></div>${isStart ? '<p class="text-xs text-rose-600 dark:text-rose-400 mt-3 font-bold text-center bg-white/60 dark:bg-darkBg/60 py-1.5 rounded-lg fade-in">✅ Inicio de ciclo registrado</p>' : ''}</div>` : ''}${pregnancyTestSection}${pillSection}${fertilityHtml}<div class="grid grid-cols-2 gap-4 mb-4"><div class="bg-emerald-50 dark:bg-emerald-900/20 p-3 rounded-2xl border border-emerald-100 dark:border-emerald-900"><label class="text-[10px] font-bold text-emerald-500 dark:text-emerald-400 uppercase tracking-wider flex items-center gap-1 mb-2">⚖️ Peso (kg)</label><input type="number" step="0.1" value="${log.weight || ''}" onchange="updateLog('${k}', 'weight', this.value)" placeholder="60.5" class="w-full text-center bg-white dark:bg-darkBg p-2 rounded-xl border border-emerald-100 dark:border-emerald-800 font-black text-slate-700 dark:text-darkText focus:outline-none"></div><div class="bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-2xl border border-indigo-100 dark:border-indigo-900"><div class="text-[10px] font-bold text-indigo-400 dark:text-indigo-300 mb-2 flex gap-1 uppercase tracking-wider text-center w-full justify-center">${ICONS.moon} Sueño</div><div class="flex items-center justify-between w-full"><button onclick="updateLog('${k}', 'sleep', 'dec')" class="w-6 h-6 bg-white dark:bg-darkCard rounded-full font-bold shadow-sm text-indigo-500">-</button><span class="font-black text-base text-slate-700 dark:text-darkText">${log.sleep||0}h</span><button onclick="updateLog('${k}', 'sleep', 'inc')" class="w-6 h-6 bg-indigo-500 text-white rounded-full font-bold shadow-sm">+</button></div></div></div><div class="mb-6"><label class="text-xs font-bold text-slate-400 dark:text-darkTextMuted mb-2 block uppercase tracking-wider">Notas del día</label><textarea onchange="updateLog('${k}', 'notes', this.value)" class="w-full p-4 bg-slate-50 dark:bg-darkBg dark:text-darkText border border-slate-200 dark:border-darkBorder rounded-2xl focus:outline-none focus:border-theme-500 transition" rows="3" placeholder="¿Cómo te sentiste hoy?">${log.notes||''}</textarea></div><div class="grid grid-cols-3 gap-3 mb-8">${symptomsHtml}</div><button onclick="closeModal()" class="w-full py-4 bg-theme-600 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition">Guardar Cambios</button></div></div>`;
            }

            app.innerHTML = html;
        }

        render();
    </script>
</body>
</html>
