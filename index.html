<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#f43f5e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lunea - Tu Guía</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        darkBorder: '#334155',
                        darkText: '#f8fafc',
                        darkTextMuted: '#94a3b8'
                    }
                }
            }
        }
    </script>
    
    <!-- html2pdf para descargas de PDF directas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; }
        .dark body { background-color: #0f172a; color: #f8fafc; }
        
        .day-cell:active { transform: scale(0.95); transition: 0.1s; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Toggle Switch */
        .toggle-checkbox:checked { right: 0; border-color: #f43f5e; }
        .toggle-checkbox:checked + .toggle-label { background-color: #f43f5e; }

        /* Keypad animations */
        .key-btn:active { background-color: #e2e8f0; transform: scale(0.95); }
        .dark .key-btn:active { background-color: #334155; }
        
        /* Privacy Blur */
        .privacy-blur { filter: blur(8px) grayscale(50%); pointer-events: none; user-select: none; transition: all 0.3s; }

        /* Chart Animation */
        .bar-grow { animation: growUp 0.8s ease-out forwards; transform-origin: bottom; }
        @keyframes growUp { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    </style>
</head>
<body class="transition-colors duration-300">

    <!-- CONTENEDOR PRINCIPAL -->
    <div id="app" class="min-h-screen pb-24 relative"></div>

    <!-- INPUT OCULTO PARA IMPORTAR -->
    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(this)">

    <!-- PANTALLA DE ERROR -->
    <div id="error-screen" class="hidden fixed inset-0 z-[9999] flex flex-col items-center justify-center p-8 text-center bg-white dark:bg-darkBg">
        <h2 class="text-red-500 font-bold text-xl mb-4">Error Crítico</h2>
        <button onclick="hardReset()" class="bg-red-500 text-white px-6 py-3 rounded-lg font-bold">Reiniciar de Fábrica</button>
    </div>

    <script>
        // --- ICONOS CORREGIDOS ---
        const ICONS = {
            heart: '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 fill-current" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',

            settings: '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',

            droplet: '<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.74 5.88a6 6 0 0 1-8.48 8.48A6 6 0 0 1 5.25 9.56L12 2.69z"/></svg>',

            edit: '<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',

            check: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
            history: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>',
            pill: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10 10 10 0 0 1-10 10"/><path d="M12 12 2 12"/></svg>',
            lock: '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
            unlock: '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>',
            delete: '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>',
            download: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
            upload: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
            info: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
            baby: '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M22 12c0 5.5-4.5 10-10 10S2 17.5 2 12 6.5 2 12 2s10 4.5 10 10Z"/></svg>',
            fileText: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>',
            eye: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>',
            eyeOff: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>',
            sun: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>',
            thermometer: '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>'
        };

        const PHASE_INFO = {
            'Menstruación': { desc: 'El revestimiento uterino se desprende. Buen momento para descansar.', color: 'bg-rose-500', text: 'text-rose-600 dark:text-rose-400', light: 'bg-rose-50 dark:bg-rose-900/30 border-rose-100 dark:border-rose-800' },
            'Folicular': { desc: 'Tu cuerpo se prepara. Estrógeno sube, aumentando tu energía.', color: 'bg-sky-400', text: 'text-sky-700 dark:text-sky-400', light: 'bg-sky-50 dark:bg-sky-900/30 border-sky-200 dark:border-sky-800' },
            'Fértil': { desc: 'La ventana fértil ha comenzado. Hay alta probabilidad de embarazo.', color: 'bg-purple-400', text: 'text-purple-600 dark:text-purple-400', light: 'bg-purple-50 dark:bg-purple-900/30 border-purple-100 dark:border-purple-800' },
            'Ovulación': { desc: 'El ovario libera un óvulo. Pico máximo de fertilidad.', color: 'bg-purple-600', text: 'text-purple-700 dark:text-purple-300', light: 'bg-purple-100 dark:bg-purple-900/50 border-purple-200 dark:border-purple-700' },
            'Lútea': { desc: 'La progesterona sube. Puedes sentir síntomas premenstruales (SPM).', color: 'bg-amber-400', text: 'text-amber-600 dark:text-amber-400', light: 'bg-amber-50 dark:bg-amber-900/30 border-amber-100 dark:border-amber-800' }
        };

        const BABY_SIZES = [
            { w: 4, s: 'Semilla de amapola 🌑' }, { w: 6, s: 'Guisante dulce 🟢' }, { w: 8, s: 'Frambuesa 🍓' }, 
            { w: 10, s: 'Fresa 🍓' }, { w: 12, s: 'Ciruela 🍑' }, { w: 14, s: 'Limón 🍋' }, 
            { w: 16, s: 'Aguacate 🥑' }, { w: 18, s: 'Pimiento 🫑' }, { w: 20, s: 'Plátano 🍌' }, 
            { w: 24, s: 'Mazorca 🌽' }, { w: 28, s: 'Berenjena 🍆' }, { w: 32, s: 'Calabaza 🎃' }, 
            { w: 36, s: 'Papaya 🍈' }, { w: 40, s: 'Sandía 🍉' }
        ];

        let tutorialStep = 0; 
        const DB_KEY = 'lunea_master_db'; 
        const LEGACY_KEYS = ['lunea_v59_pin', 'lunea_v58_pill', 'lunea_v57_final']; 

        let state = {
            view: 'calendar',
            currentMonth: new Date(),
            viewYear: new Date().getFullYear(),
            selectedDate: null,
            users: [{ id: '1', name: 'Yo', config: { lastPeriod: new Date().toISOString().split('T')[0], cycleLen: 28, periodLen: 5, pill: false, pregnancyMode: false }, periodHistory: [], logs: {} }],
            currentUserId: '1',
            showTutorial: true,
            pin: null, 
            inputPin: '',
            isBlurred: false,
            darkMode: false,
            reportMonths: 1 
        };

        try {
            let saved = localStorage.getItem(DB_KEY);
            if (!saved) {
                for (const key of LEGACY_KEYS) {
                    const legacyData = localStorage.getItem(key);
                    if (legacyData) { saved = legacyData; localStorage.setItem(DB_KEY, saved); break; }
                }
            }
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...state, ...parsed, currentMonth: new Date(), viewYear: new Date().getFullYear(), selectedDate: null, inputPin: '' };
                if (!state.reportMonths) state.reportMonths = 1;
                state.users.forEach(u => {
                    if (!u.periodHistory) u.periodHistory = [u.config.lastPeriod];
                    if (u.config.pregnancyMode === undefined) u.config.pregnancyMode = false;
                });
                if (state.pin) state.view = 'locked';
            }
        } catch(e) { console.log('Error carga:', e); }

        if (state.darkMode) document.documentElement.classList.add('dark');

        function save() { localStorage.setItem(DB_KEY, JSON.stringify(state)); render(); }
        function getUser() { return state.users.find(u => u.id === state.currentUserId) || state.users[0]; }
        function toKey(d) { const o = d.getTimezoneOffset() * 60000; return new Date(d.getTime() - o).toISOString().split('T')[0]; }

        function recalculateCycleStats(user) {
            if (!user.periodHistory || user.periodHistory.length < 2) return;
            const sortedHistory = [...user.periodHistory].sort((a, b) => new Date(a) - new Date(b));
            user.config.lastPeriod = sortedHistory[sortedHistory.length - 1];

            let totalDays = 0, count = 0;
            for (let i = 1; i < sortedHistory.length; i++) {
                const diffDays = Math.ceil(Math.abs(new Date(sortedHistory[i]) - new Date(sortedHistory[i-1])) / (1000 * 60 * 60 * 24));
                if (diffDays >= 15 && diffDays <= 50) { totalDays += diffDays; count++; }
            }
            if (count > 0) user.config.cycleLen = Math.round(totalDays / count);
        }

        function togglePeriodStart(dateStr) {
            const user = getUser();
            if (!user.periodHistory) user.periodHistory = [];
            if (user.periodHistory.includes(dateStr)) {
                user.periodHistory = user.periodHistory.filter(d => d !== dateStr);
            } else {
                user.periodHistory.push(dateStr);
                if(user.config.pregnancyMode) user.config.pregnancyMode = false;
            }
            recalculateCycleStats(user);
            save();
        }

        function getCycleDay(dateStr) {
            const user = getUser();
            const start = new Date(user.config.lastPeriod + 'T00:00:00');
            const target = new Date(dateStr + 'T00:00:00');
            if (target < start && user.periodHistory && user.periodHistory.length > 0) {
                const sorted = [...user.periodHistory].sort((a, b) => new Date(b) - new Date(a));
                const relevantStart = sorted.find(d => new Date(d + 'T00:00:00') <= target);
                if (relevantStart) return Math.floor((target - new Date(relevantStart + 'T00:00:00')) / 86400000) + 1;
            }
            const diff = Math.floor((target - start) / 86400000);
            return diff < 0 ? null : diff + 1; 
        }

        function getPhase(dateStr) {
            const user = getUser();
            if (user.config.pregnancyMode) {
                return {l:'Embarazo', bg:'bg-fuchsia-400', t:'text-fuchsia-600 dark:text-fuchsia-400', light:'bg-fuchsia-50 dark:bg-fuchsia-900/30 border-fuchsia-100 dark:border-fuchsia-800', isStart:false};
            }
            let cd = getCycleDay(dateStr);
            if (!cd) return null;
            if (cd > user.config.cycleLen) cd = ((cd - 1) % user.config.cycleLen) + 1; 

            const ov = user.config.cycleLen - 14;
            const isStart = user.periodHistory && user.periodHistory.includes(dateStr);
            if (cd <= user.config.periodLen) return { ...PHASE_INFO['Menstruación'], isStart, l: 'Menstruación'};
            if (cd >= ov - 5 && cd < ov) return { ...PHASE_INFO['Fértil'], isStart, l: 'Fértil' };
            if (cd === ov) return { ...PHASE_INFO['Ovulación'], isStart, l: 'Ovulación' };
            if (cd > ov) return { ...PHASE_INFO['Lútea'], isStart, l: 'Lútea' };
            return { ...PHASE_INFO['Folicular'], isStart, l: 'Folicular' };
        }

        window.toggleDarkMode = () => { state.darkMode = !state.darkMode; if(state.darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); save(); };
        window.toggleBlur = () => { state.isBlurred = !state.isBlurred; render(); };
        window.goToToday = () => { state.currentMonth = new Date(); state.viewYear = new Date().getFullYear(); render(); };
        window.deleteHistoryItem = (dateStr) => { if(confirm('¿Borrar este inicio de periodo?')) { const u = getUser(); u.periodHistory = u.periodHistory.filter(d => d !== dateStr); recalculateCycleStats(u); save(); } };
        window.exportData = () => { const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(state)); const a = document.createElement('a'); a.setAttribute('href', dataUri); a.setAttribute('download', `lunea_backup_${new Date().toISOString().split('T')[0]}.json`); a.click(); };
        window.triggerImport = () => document.getElementById('importFile').click();
        window.importData = (input) => { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { try { const loadedState = JSON.parse(e.target.result); if (!loadedState.users) throw new Error(); if(confirm("¿Restaurar copia? Se reemplazarán los datos actuales.")) { state = { ...state, ...loadedState, view: 'calendar', selectedDate: null, inputPin: '', currentMonth: new Date() }; save(); location.reload(); } } catch(err) { alert("Error al importar el archivo."); } }; reader.readAsText(file); input.value = ''; };

        window.typePin = (num) => {
            if (state.inputPin.length < 4) {
                state.inputPin += num; render();
                if (state.inputPin.length === 4) {
                    setTimeout(() => {

                    }, 200); 
                }
            }

        window.setYear = (delta) => { state.viewYear += delta; render(); };
        window.selectDate = (k) => { state.selectedDate = k; render(); };
        
        window.updateReportMonths = (val) => { state.reportMonths = parseInt(val); save(); };

        window.updateLog = (key, field, val) => {
            const user = getUser();
            if (!user.logs[key]) user.logs[key] = {};
            if (field === 'water' || field === 'sleep') {
                let current = user.logs[key][field] || 0;
                user.logs[key][field] = val === 'inc' ? current + 1 : Math.max(0, current - 1);
            } else if (field === 'pill') { user.logs[key].pill = !user.logs[key].pill; } 
            else if (field === 'pregnancyTest') {
                if (user.logs[key].pregnancyTest === val) delete user.logs[key].pregnancyTest;
                else user.logs[key].pregnancyTest = val;
            } else if (field === 'symptoms') {
                let current = user.logs[key].symptoms || [];
                user.logs[key].symptoms = current.includes(val) ? current.filter(s => s !== val) : [...current, val];
            } else { user.logs[key][field] = val; }
            save();
        };

        window.updateConfig = (field, val) => {
            const user = getUser();
            if(field !== 'lastPeriod' && field !== 'pill' && field !== 'pregnancyMode') val = parseInt(val);
            if(field === 'pill' || field === 'pregnancyMode') val = val === 'true'; 
            user.config[field] = val;
            if (field === 'lastPeriod' && !user.periodHistory.includes(val)) { user.periodHistory.push(val); recalculateCycleStats(user); }

            const element = document.getElementById('report-content');

            btn.innerText = "Generando PDF...";
            btn.disabled = true;

            window.scrollTo(0, 0);

                margin:       10,
                filename:     `Lunea_Reporte_${new Date().toISOString().split('T')[0]}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const wasDark = document.documentElement.classList.contains('dark');
            if(wasDark) document.documentElement.classList.remove('dark');

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerText = originalText;
                btn.disabled = false;
                if(wasDark) document.documentElement.classList.add('dark');

                console.error(err);

            }

            // VISTAS COMUNES
            html += `<div class="px-6 py-4 flex justify-between items-center bg-white dark:bg-darkCard shadow-sm sticky top-0 z-20 transition-colors"><div class="flex items-center gap-2 text-rose-500">${ICONS.heart} <h1 class="text-xl font-bold text-slate-800 dark:text-darkText">Lunea</h1></div><div class="flex gap-1"><button onclick="toggleBlur()" class="text-slate-400 hover:text-indigo-500 p-2 transition ${state.isBlurred ? 'text-indigo-500' : ''}">${state.isBlurred ? ICONS.eyeOff : ICONS.eye}</button><button onclick="toggleDarkMode()" class="text-slate-400 hover:text-amber-500 p-2 transition">${state.darkMode ? ICONS.sun : ICONS.moon}</button></div></div>`;

            if (state.view === 'calendar') {

                    const isActive = (log.symptoms || []).includes(s);
                    const activeColor = user.config.pregnancyMode ? 'bg-fuchsia-100 dark:bg-fuchsia-900/40 border-fuchsia-300 text-fuchsia-700 dark:text-fuchsia-300 scale-105' : 'bg-rose-100 dark:bg-rose-900/40 border-rose-300 text-rose-700 dark:text-rose-300 scale-105';
                    return `<button onclick="updateLog('${k}', 'symptoms', '${s}')" class="p-3 rounded-xl border flex flex-col items-center gap-1 transition shadow-sm ${isActive ? activeColor : 'border-slate-100 dark:border-darkBorder text-slate-500 dark:text-darkTextMuted bg-white dark:bg-darkCard'}"><span class="capitalize text-xs font-bold">${s}</span></button>`;
                }).join('');

                let pillSection = '';
                if (user.config.pill && !user.config.pregnancyMode) {
                    const taken = log.pill;
                    pillSection = `<div class="bg-teal-50 dark:bg-teal-900/20 p-4 rounded-xl mb-4 flex justify-between items-center border border-teal-100 dark:border-teal-800"><div class="flex items-center gap-3"><div class="bg-white dark:bg-darkCard p-2 rounded-full text-teal-500 shadow-sm">${ICONS.pill}</div><div><h4 class="font-bold text-slate-800 dark:text-darkText">Anticonceptivo</h4><p class="text-xs text-teal-600 dark:text-teal-400">${taken ? 'Tomada hoy' : 'Pendiente'}</p></div></div><button onclick="updateLog('${k}', 'pill')" class="px-4 py-2 rounded-lg font-bold text-sm transition ${taken ? 'bg-teal-500 text-white shadow-lg shadow-teal-200 dark:shadow-none' : 'bg-white dark:bg-darkCard text-teal-500 border border-teal-200 dark:border-teal-800'}">${taken ? 'Tomada' : 'Marcar'}</button></div>`;
                }

                let fertilityHtml = '';
                if (!user.config.pregnancyMode) {
                    fertilityHtml = `<div class="grid grid-cols-2 gap-4 mb-4"><div class="bg-orange-50 dark:bg-orange-900/20 p-3 rounded-2xl border border-orange-100 dark:border-orange-900"><label class="text-[10px] font-bold text-orange-500 dark:text-orange-400 uppercase tracking-wider flex items-center gap-1 mb-2">${ICONS.thermometer} Temp Basal</label><div class="flex items-center gap-1 bg-white dark:bg-darkBg p-2 rounded-xl border border-orange-100 dark:border-orange-800"><input type="number" step="0.1" value="${log.bbt || ''}" onchange="updateLog('${k}', 'bbt', this.value)" placeholder="36.5" class="w-full text-center bg-transparent font-black text-slate-700 dark:text-darkText focus:outline-none"><span class="text-slate-400 text-xs font-bold">°C</span></div></div><div class="bg-purple-50 dark:bg-purple-900/20 p-3 rounded-2xl border border-purple-100 dark:border-purple-900"><label class="text-[10px] font-bold text-purple-500 dark:text-purple-400 uppercase tracking-wider flex items-center gap-1 mb-2">💧 Flujo</label><select onchange="updateLog('${k}', 'flow', this.value)" class="w-full bg-white dark:bg-darkBg p-2 rounded-xl text-xs font-bold text-slate-700 dark:text-darkText border border-purple-100 dark:border-purple-800 focus:outline-none"><option value="">Ninguno</option><option value="Seco" ${log.flow === 'Seco' ? 'selected' : ''}>Seco</option><option value="Pegajoso" ${log.flow === 'Pegajoso' ? 'selected' : ''}>Pegajoso</option><option value="Cremoso" ${log.flow === 'Cremoso' ? 'selected' : ''}>Cremoso</option><option value="Clara_huevo" ${log.flow === 'Clara_huevo' ? 'selected' : ''}>Fértil (Clara)</option></select></div></div>`;
                }

                const testResult = log.pregnancyTest;
                const pregnancyTestSection = `<div class="bg-fuchsia-50 dark:bg-fuchsia-900/20 p-4 rounded-2xl mb-4 border border-fuchsia-100 dark:border-fuchsia-900/50"><div class="flex items-center gap-2 mb-3"><div class="text-fuchsia-500">${ICONS.baby}</div><h4 class="text-sm font-bold text-fuchsia-700 dark:text-fuchsia-400 uppercase tracking-wider">Prueba de Embarazo</h4></div><div class="flex gap-2"><button onclick="updateLog('${k}', 'pregnancyTest', 'negative')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition flex justify-center items-center gap-2 ${testResult === 'negative' ? 'bg-slate-800 dark:bg-slate-700 text-white shadow-md' : 'bg-white dark:bg-darkCard text-slate-500 dark:text-darkTextMuted border border-slate-200 dark:border-darkBorder hover:bg-slate-50 dark:hover:bg-slate-800'}">Negativa</button><button onclick="updateLog('${k}', 'pregnancyTest', 'positive')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition flex justify-center items-center gap-2 ${testResult === 'positive' ? 'bg-fuchsia-500 text-white shadow-lg shadow-fuchsia-200 dark:shadow-none scale-105' : 'bg-white dark:bg-darkCard text-fuchsia-500 dark:text-fuchsia-400 border border-fuchsia-200 dark:border-fuchsia-800 hover:bg-fuchsia-50 dark:hover:bg-fuchsia-900/30'}">Positiva</button></div></div>`;

                html += `<div class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end justify-center animate-in" onclick="closeModal()"><div class="w-full max-w-sm bg-white dark:bg-darkBg rounded-t-[2rem] p-6 h-[85vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()"><div class="flex justify-between items-center mb-6"><h3 class="text-2xl font-bold capitalize text-slate-800 dark:text-darkText">${displayDate}</h3><button onclick="closeModal()" class="p-2 bg-slate-100 dark:bg-darkCard rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-500 dark:text-darkText transition">${ICONS.close}</button></div>${currentPhase && !user.config.pregnancyMode ? `<div class="${phaseDetails.light} p-4 rounded-xl mb-4 border border-opacity-50"><div class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full ${phaseDetails.color}"></div><h4 class="font-bold ${phaseDetails.text}">${currentPhase.l}</h4></div><p class="text-xs text-slate-600 dark:text-slate-400 leading-snug">${phaseDetails.desc}</p></div>` : ''}${!user.config.pregnancyMode ? `<div class="bg-rose-50 dark:bg-rose-900/20 p-5 rounded-2xl mb-4 border border-rose-100 dark:border-rose-900 relative overflow-hidden transition-all">${isPeriodStart ? '<div class="absolute -right-4 -top-4 w-16 h-16 bg-rose-200 dark:bg-rose-800 rounded-full opacity-50"></div>' : ''}<div class="flex justify-between items-center relative z-10"><div class="flex items-center gap-4"><div class="bg-white dark:bg-darkCard p-3 rounded-full text-rose-500 shadow-sm">${ICONS.droplet}</div><div><h4 class="font-bold text-slate-800 dark:text-darkText">Menstruación</h4><p class="text-xs text-slate-500 dark:text-darkTextMuted">¿Inició hoy?</p></div></div><div class="relative inline-block w-14 h-8 align-middle select-none"><input type="checkbox" id="periodToggle" class="toggle-checkbox absolute block w-8 h-8 rounded-full bg-white dark:bg-darkCard border-4 appearance-none cursor-pointer border-slate-300 dark:border-slate-600 transition-all duration-300" ${isPeriodStart ? 'checked' : ''} onclick="handlePeriodToggle('${k}')"/><label for="periodToggle" class="toggle-label block overflow-hidden h-8 rounded-full bg-slate-300 dark:bg-slate-600 cursor-pointer transition-all duration-300"></label></div></div>${isPeriodStart ? '<p class="text-xs text-rose-600 dark:text-rose-400 mt-3 font-bold text-center bg-white/60 dark:bg-darkBg/60 py-1.5 rounded-lg fade-in">✅ Inicio de ciclo registrado</p>' : ''}</div>` : ''}${pregnancyTestSection}${pillSection}${fertilityHtml}<div class="grid grid-cols-2 gap-4 mb-4"><div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-2xl flex flex-col items-center border border-blue-50 dark:border-blue-900"><div class="text-xs font-bold text-blue-400 dark:text-blue-300 mb-2 flex gap-1 uppercase tracking-wider">${ICONS.droplet} Agua</div><div class="flex items-center gap-3"><button onclick="updateLog('${k}', 'water', 'dec')" class="w-8 h-8 bg-white dark:bg-darkCard rounded-full font-bold shadow-sm text-blue-500 hover:scale-105 transition">-</button><span class="font-black text-xl text-slate-700 dark:text-darkText">${log.water||0}</span><button onclick="updateLog('${k}', 'water', 'inc')" class="w-8 h-8 bg-blue-500 text-white rounded-full font-bold shadow-lg shadow-blue-200 dark:shadow-none hover:scale-105 transition">+</button></div></div><div class="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-2xl flex flex-col items-center border border-indigo-50 dark:border-indigo-900"><div class="text-xs font-bold text-indigo-400 dark:text-indigo-300 mb-2 flex gap-1 uppercase tracking-wider">${ICONS.moon} Sueño</div><div class="flex items-center gap-3"><button onclick="updateLog('${k}', 'sleep', 'dec')" class="w-8 h-8 bg-white dark:bg-darkCard rounded-full font-bold shadow-sm text-indigo-500 hover:scale-105 transition">-</button><span class="font-black text-xl text-slate-700 dark:text-darkText">${log.sleep||0}h</span><button onclick="updateLog('${k}', 'sleep', 'inc')" class="w-8 h-8 bg-indigo-500 text-white rounded-full font-bold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-105 transition">+</button></div></div></div><div class="mb-6"><label class="text-xs font-bold text-slate-400 dark:text-darkTextMuted mb-2 block uppercase tracking-wider">Notas del día</label><textarea onchange="updateLog('${k}', 'notes', this.value)" class="w-full p-4 bg-slate-50 dark:bg-darkBg dark:text-darkText border border-slate-200 dark:border-darkBorder rounded-2xl focus:outline-none focus:border-rose-300 dark:focus:border-rose-700 transition" rows="3" placeholder="¿Cómo te sentiste hoy?">${log.notes||''}</textarea></div><div class="grid grid-cols-3 gap-3 mb-8">${symptomsHtml}</div><button onclick="closeModal()" class="w-full py-4 bg-slate-900 dark:bg-slate-700 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition">Guardar Cambios</button></div></div>`;
            }

            app.innerHTML = html;
        }

        render();
    </script>
</body>
</html>
